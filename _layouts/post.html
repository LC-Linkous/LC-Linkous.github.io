---
layout: default
title: LC-Linkous.github.io
---

<main id="main" class="site-main">

  <article id="post" class="single post">
    <h1>{{ page.title }}</h1>
    <h3>{{ page.datePosted }}</h3>
    {{ content }}
    <br>
    {% for tag in page.tags %}
      <a class="post" href="/tags/{{ tag }}">#{{ tag }}</a>{% unless forloop.last %}, {% endunless %}
    {% endfor %}
  </article><!-- #post -->

  {% include related-posts.html tag=page.tags[0] exclude=page.url %}

</main><!-- .site-main -->
